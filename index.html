<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Data Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        .lang-switch {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .lang-switch:hover {
            background: #764ba2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .data-list {
            margin-top: 40px;
            border-top: 2px solid #f0f0f0;
            padding-top: 30px;
        }

        .data-list h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .list-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 15px;
        }

        .item-content {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .item-text {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .item-time {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
        }

        .btn-edit:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .export-import {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .export-import button {
            flex: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .button-group {
                flex-direction: column;
            }

            .list-item {
                flex-direction: column;
            }

            .item-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="title">Local Data Platform</h1>
            <button class="lang-switch" onclick="toggleLanguage()">中文</button>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <form onsubmit="handleAddItem(event)">
            <div class="form-group">
                <label for="itemName" id="labelName">Name / Title</label>
                <input type="text" id="itemName" placeholder="Enter name..." required>
            </div>

            <div class="form-group">
                <label for="itemEmail" id="labelEmail">Email / Contact</label>
                <input type="email" id="itemEmail" placeholder="Enter email...">
            </div>

            <div class="form-group">
                <label for="itemContent" id="labelContent">Content / Notes</label>
                <textarea id="itemContent" placeholder="Enter your content here..."></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary" id="btnAdd">Add Item</button>
                <button type="button" class="btn-secondary" onclick="clearForm()" id="btnClear">Clear Form</button>
            </div>
        </form>

        <div class="export-import">
            <button class="btn-secondary" onclick="exportData()" id="btnExport">Export Data</button>
            <button class="btn-secondary" onclick="triggerImport()" id="btnImport">Import Data</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
        </div>

        <div class="data-list">
            <h2 id="listTitle">Saved Items</h2>
            <div id="itemsList"></div>
        </div>
    </div>

    <script>
        // Language configuration
        const translations = {
            en: {
                title: 'Local Data Platform',
                labelName: 'Name / Title',
                labelEmail: 'Email / Contact',
                labelContent: 'Content / Notes',
                btnAdd: 'Add Item',
                btnClear: 'Clear Form',
                btnExport: 'Export Data',
                btnImport: 'Import Data',
                listTitle: 'Saved Items',
                addSuccess: 'Item added successfully!',
                deleteSuccess: 'Item deleted successfully!',
                updateSuccess: 'Item updated successfully!',
                noItems: 'No items saved yet. Add one to get started!',
                confirmDelete: 'Are you sure you want to delete this item?',
                exportSuccess: 'Data exported successfully!',
                importSuccess: 'Data imported successfully!',
                importError: 'Error importing data. Make sure the file is valid.',
                edit: 'Edit',
                delete: 'Delete'
            },
            zh: {
                title: '本地數據平台',
                labelName: '名稱 / 標題',
                labelEmail: '郵箱 / 聯繫方式',
                labelContent: '內容 / 備註',
                btnAdd: '添加項目',
                btnClear: '清除表單',
                btnExport: '匯出數據',
                btnImport: '導入數據',
                listTitle: '已保存的項目',
                addSuccess: '項目添加成功！',
                deleteSuccess: '項目刪除成功！',
                updateSuccess: '項目更新成功！',
                noItems: '還沒有保存任何項目。添加一個開始吧！',
                confirmDelete: '確定要刪除此項目嗎？',
                exportSuccess: '數據匯出成功！',
                importSuccess: '數據導入成功！',
                importError: '導入數據出錯。請確保文件有效。',
                edit: '編輯',
                delete: '刪除'
            }
        };

        let currentLanguage = 'en';
        let editingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadItems();
        });

        // Toggle language
        function toggleLanguage() {
            currentLanguage = currentLanguage === 'en' ? 'zh' : 'en';
            updateUILanguage();
            localStorage.setItem('language', currentLanguage);
        }

        // Update UI language
        function updateUILanguage() {
            const t = translations[currentLanguage];
            document.getElementById('title').textContent = t.title;
            document.getElementById('labelName').textContent = t.labelName;
            document.getElementById('labelEmail').textContent = t.labelEmail;
            document.getElementById('labelContent').textContent = t.labelContent;
            document.getElementById('btnAdd').textContent = t.btnAdd;
            document.getElementById('btnClear').textContent = t.btnClear;
            document.getElementById('btnExport').textContent = t.btnExport;
            document.getElementById('btnImport').textContent = t.btnImport;
            document.getElementById('listTitle').textContent = t.listTitle;
            document.querySelector('.lang-switch').textContent = currentLanguage === 'en' ? '中文' : 'English';
            renderItems();
        }

        // Load saved language preference
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('language');
            if (saved) {
                currentLanguage = saved;
                updateUILanguage();
            }
        });

        // Add item
        function handleAddItem(event) {
            event.preventDefault();
            const t = translations[currentLanguage];
            
            const name = document.getElementById('itemName').value.trim();
            const email = document.getElementById('itemEmail').value.trim();
            const content = document.getElementById('itemContent').value.trim();

            if (!name) {
                showStatus(t.labelName + ' is required', 'error');
                return;
            }

            const items = getItems();
            const item = {
                id: editingId || Date.now(),
                name,
                email,
                content,
                timestamp: new Date().toLocaleString(currentLanguage === 'en' ? 'en-US' : 'zh-TW')
            };

            if (editingId) {
                const index = items.findIndex(i => i.id === editingId);
                if (index !== -1) {
                    items[index] = item;
                    showStatus(t.updateSuccess, 'success');
                }
                editingId = null;
                document.getElementById('btnAdd').textContent = t.btnAdd;
            } else {
                items.push(item);
                showStatus(t.addSuccess, 'success');
            }

            saveItems(items);
            clearForm();
        }

        // Clear form
        function clearForm() {
            document.getElementById('itemName').value = '';
            document.getElementById('itemEmail').value = '';
            document.getElementById('itemContent').value = '';
            editingId = null;
            const t = translations[currentLanguage];
            document.getElementById('btnAdd').textContent = t.btnAdd;
        }

        // Edit item
        function editItem(id) {
            const items = getItems();
            const item = items.find(i => i.id === id);
            
            if (item) {
                document.getElementById('itemName').value = item.name;
                document.getElementById('itemEmail').value = item.email;
                document.getElementById('itemContent').value = item.content;
                editingId = id;
                const t = translations[currentLanguage];
                document.getElementById('btnAdd').textContent = 'Update Item';
                document.getElementById('itemName').focus();
            }
        }

        // Delete item
        function deleteItem(id) {
            const t = translations[currentLanguage];
            if (confirm(t.confirmDelete)) {
                const items = getItems();
                const filtered = items.filter(i => i.id !== id);
                saveItems(filtered);
                showStatus(t.deleteSuccess, 'success');
            }
        }

        // Get items from storage
        function getItems() {
            const data = localStorage.getItem('appItems');
            return data ? JSON.parse(data) : [];
        }

        // Save items to storage
        function saveItems(items) {
            localStorage.setItem('appItems', JSON.stringify(items));
            renderItems();
        }

        // Render items
        function renderItems() {
            const items = getItems();
            const container = document.getElementById('itemsList');
            const t = translations[currentLanguage];

            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state"><p>${t.noItems}</p></div>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="list-item">
                    <div class="item-content">
                        <div class="item-title">${escapeHtml(item.name)}</div>
                        ${item.email ? `<div class="item-text"><strong>Email:</strong> ${escapeHtml(item.email)}</div>` : ''}
                        ${item.content ? `<div class="item-text">${escapeHtml(item.content).replace(/\n/g, '<br>')}</div>` : ''}
                        <div class="item-time">${item.timestamp}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn-small btn-edit" onclick="editItem(${item.id})">${t.edit}</button>
                        <button class="btn-small btn-delete" onclick="deleteItem(${item.id})">${t.delete}</button>
                    </div>
                </div>
            `).join('');
        }

        // Load items on startup
        function loadItems() {
            renderItems();
        }

        // Export data
        function exportData() {
            const t = translations[currentLanguage];
            const items = getItems();
            const dataStr = JSON.stringify(items, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `data-export-${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showStatus(t.exportSuccess, 'success');
        }

        // Trigger import
        function triggerImport() {
            document.getElementById('importFile').click();
        }

        // Import data
        function importData(event) {
            const t = translations[currentLanguage];
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        saveItems(imported);
                        showStatus(t.importSuccess, 'success');
                    } else {
                        showStatus(t.importError, 'error');
                    }
                } catch (error) {
                    showStatus(t.importError, 'error');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // Show status message
        function showStatus(message, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = 'status-message status-' + type;
            setTimeout(() => {
                el.className = 'status-message';
            }, 3000);
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
